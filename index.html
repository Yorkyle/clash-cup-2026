function ensureAudio(){

function noiseBuffer(duration=0.4){

function tokenPos(){
  const z = state.zone;
  const clampX = x => clamp(x, 34, 636);
  const attackX = state.possession==='P' ? [95,225,350,500,596][z] : [575,470,350,205,92][z];

  const p = {
    pK:[8,62], aK:[664,62],
    pP:[132,108], pCap:[222,48], pW:[168,22], pD:[78,72],
    aP:[536,108], aCap:[448,48], aW:[502,22], aD:[590,72]
  };

  if(state.possession==='P'){
    p.pP=[clampX(attackX),108];
    p.pCap=[clampX(attackX+4),48];
    p.pW=[clampX(attackX-58),22];
    p.pD=[clampX(attackX-160),72];

    p.aD=[clampX(attackX+94),72];
    p.aP=[clampX(attackX+132),108];
    p.aCap=[clampX(attackX+66),48];
    p.aW=[clampX(attackX+30),22];
  } else {
    p.aP=[clampX(attackX),108];
    p.aCap=[clampX(attackX-4),48];
    p.aW=[clampX(attackX+58),22];
    p.aD=[clampX(attackX+160),72];

    p.pD=[clampX(attackX-94),72];
    p.pP=[clampX(attackX-132),108];
    p.pCap=[clampX(attackX-66),48];
    p.pW=[clampX(attackX-30),22];
  }
  return p;
}
function ballPos(){ if(state.preKickoff) return [339,75]; return ballPosFor(state.possession,state.carrier,state.zone); }
function tokenPosFor(zone){
  const base = {
    P: {defender:[78,62], player:[130,104], captain:[220,44], striker:[260,94], winger:[175,30], keeper:[8,62]},
    A: {defender:[590,62], player:[536,102], captain:[448,44], striker:[405,94], winger:[495,30], keeper:[664,62]}
  };
  const shift = [0,40,80,120,165][zone];
  return {
    pCap:[base.P.captain[0]+shift*0.78, base.P.captain[1]], pP:[base.P.player[0]+shift*0.76, base.P.player[1]], pW:[base.P.winger[0]+shift*0.72, base.P.winger[1]], pD:[base.P.defender[0]+shift*0.52, base.P.defender[1]], pK:base.P.keeper,
    aCap:[base.A.captain[0]-shift*0.78, base.A.captain[1]], aP:[base.A.player[0]-shift*0.76, base.A.player[1]], aW:[base.A.winger[0]-shift*0.72, base.A.winger[1]], aD:[base.A.defender[0]-shift*0.52, base.A.defender[1]], aK:base.A.keeper

function carrierKey(side, carrier){
  if(carrier==='captain') return side==='P'?'pCap':'aCap';

  if(carrier==='striker') return side==='P'?'pP':'aP';

}
function ballPosFor(side, carrier, zone){ const p = tokenPosFor(zone); const key = carrierKey(side, carrier); return [p[key][0]+4,p[key][1]+4]; }

    state.phase==='corner' ? `${sideName(s)} gather around the corner flag.` :

function campaignAutoChoiceNow(){
  ensureAudio();
  const phase=state.phase;
  if(state.playMode!=='campaign' || state.possession!=='A'){ render(); return; }
  const s=state.possession;
  if(phase==='danger'){
    const st=state.style?.[s] || {};
    if(specialReady(s) && chance(st.last==='shot' && st.streak>=2 ? .22 : .38)){
      speak(s,'captain',`${sideName(s)} captain steps into the moment. The AI chooses the special attack.`,'Match Commentary');
      return chooseDanger('special');
    }
    if(chance(isTeam(s,'argentina') ? .68 : .58)){
      speak(s,'player',`${sideName(s)} slow the attack down and look for the cleaner pass.`,'Match Commentary');
      return chooseDanger('setup');
    }
    speak(s,'player',`${sideName(s)} decide the opening is good enough and take the shot.`,'Match Commentary');
    return chooseDanger('shot');
  }
  if(phase==='finish'){
    speak(s,'player',`${sideName(s)} have created the chance. The finish is coming now.`,'Match Commentary');
    resolveFinish(); return;
  }
  if(phase==='corner'){
    const opts=['header','kick','captain'];
    const pick=opts[rnd(opts.length)];
    speak(s,'player',`${sideName(s)} choose their corner routine: ${pick==='captain'?'pass to the captain':pick}.`,'Match Commentary');
    chooseCorner(pick); return;
  }
  if(phase==='freekick'){
    const pick=chance(.55)?'pass':'shoot';
    speak(s,'captain',`${sideName(s)} ${pick==='shoot'?'go straight for goal':'use the free kick to set up the next chance'}.`,'Match Commentary');
    chooseFreeKick(pick); return;
  }
  render();
}

function campaignFinishMatch(winnerSide=null, shootout=false){

  const draw = !winnerSide;
  const playerWin = winnerSide==='P';
  if(current.type==='group'){

  }

  c.last=result;

function campaignAutoShootout(){
  const pPower = 55 + Math.round(effectiveStat('P','special')/5) + (state.campaign.difficulty==='hero'?10:0);
  const aPower = 52 + Math.round(effectiveStat('A','special')/5) + (state.campaign.difficulty==='legend'?6:0);
  let p=0,a=0;
  for(let i=0;i<5;i++){ if(chance(clamp(pPower,45,82)/100)) p++; if(chance(clamp(aPower,45,82)/100)) a++; }
  let guard=0;
  while(p===a && guard<10){ if(chance(clamp(pPower,45,82)/100)) p++; if(chance(clamp(aPower,45,82)/100)) a++; guard++; }
  if(p===a){ if(chance(.52)) p++; else a++; }
  state.pen={score:{P:p,A:a},history:[]};
  campaignFinishMatch(p>a?'P':'A', true);
}

function stoppageMinutes(){
  let s=0;
  const goals = state.score.P + state.score.A;
  if(state.penaltyUsed) s += 1;
  if(countEvents('freeKick','P') + countEvents('freeKick','A') > 0) s += 1;
  if(countEvents('yellow','P') + countEvents('yellow','A') > 0) s += 1;
  if(goals>=4) s += 1;
  if(goals>=6) s += 1;
  return clamp(s,0,8);
}
function finalTargetMinute(){
  if(state.finalMinute==null) state.finalMinute = 90 + stoppageMinutes();
  return state.finalMinute;
}
function matchMinuteStep(){
  if(state.playMode==='faceoff') return 3 + rnd(3);
  return 4 + rnd(4);
}
function playBeatDelayMs(){
  return 1600;
}
function enterFulltime(){
  state.phase='fulltime';
  state.minute = finalTargetMinute();
  if(state.playMode==='campaign'){
    speak('P','commentator',`Full time: ${state.score.P}-${state.score.A}.`,'Final Whistle');
    render(); return;
  }
  if(state.score.P!==state.score.A){
    const winner = state.score.P>state.score.A?'P':'A';
    triggerVictoryCelebration(winner,false); return;
  }
  speak('P','commentator',`Full time: ${state.score.P}-${state.score.A}.`,'Final Whistle');
  render();
}
function nextPlay(){
  ensureAudio();
  if(state.cinematic) return;
  if(state.phase!=='idle'){ render(); return; }
  if(state.minute>=90 && state.minute>=finalTargetMinute()){ enterFulltime(); return; }
  state.turn++;
  const inc = matchMinuteStep();
  let maxClock = state.finalMinute || 98;
  let projected = clamp(state.minute + inc, 0, maxClock);
  if(!state.halftimeShown && projected>=45){
    state.minute = 45;
    state.halftimeShown=true;
    state.halftimeTie = state.score.P === state.score.A;
    showCinematic([{img:ASSETS.commentatorHalftime,title:'Halftime Report',text:generateHalftimeRecap(),sound:'click'}], ()=>{
      speak('P','commentator',`Halftime: ${sideName('P')} ${state.score.P} - ${state.score.A} ${sideName('A')}. The second half begins with everything still to play for.`,'Commentator');
      state.phase='idle'; render();
    });
    return;
  }
  if(projected>=90 && state.finalMinute==null){
    state.finalMinute = 90 + stoppageMinutes();
    projected = Math.min(projected, state.finalMinute);
  }
  state.minute = projected;
  state.cool.P=Math.max(0,state.cool.P-1);
  state.cool.A=Math.max(0,state.cool.A-1);
  decayTurnEffects();
  if(state.zone>=3){
    const s=state.possession;
    if(penaltyAllowed(s) && chance(0.12)){ triggerPenalty(s); return; }
    state.phase='danger';
    speak(s, state.carrier==='captain'?'captain':'player', s==='P'?'This is the moment. Put us through.':'We are close now. Pick the final action.');
    render(); return;
  }
  simulateGame();
  render();
}

function randomCarrier(close=false){ let r=Math.random(); if(close){ if(r<.45)return 'captain'; if(r<.72)return 'player'; if(r<.88)return 'winger'; return 'striker'; } if(r<.28)return 'captain'; if(r<.57)return 'player'; if(r<.79)return 'winger'; return 'striker'; }
function simulateGame(){ const before=snapshotPlay(); const s=state.possession,d=other(s),ot=team(s),dt=team(d); state.carrier=randomCarrier(false); const acts=['short passing move','switch of play','dribble into space','long diagonal ball','one-two combination']; const act=acts[rnd(acts.length)]; const rallyChance = injuryRallyChance(); if(rallyChance>0 && chance(rallyChance)){ triggerRally(rallyTarget()); return; } const fkChance = freeKickChance(); if(fkChance>0 && chance(fkChance)){ setAnim('freekick', before, 'Foul: free kick'); triggerFreeKick(s,d); return; } if(yellowAllowed() && chance(0.08)){ setAnim('turnover', before, 'Whistle: late challenge'); triggerYellow(d,s,'A late sliding challenge'); return; } const atk = 50 + effectiveStat(s,'build')/3 + rnd(28) + (state.carrier==='captain'?8:0); const def = 50 + effectiveStat(d,'build')/3 + rnd(30); if(atk>=def){ const gain = (act.includes('long') || act.includes('one-two')) && chance(.45) ? 2 : 1; state.zone = clamp(state.zone + gain,0,4); state.carrier = randomCarrier(state.zone>=3); setAnim('advance', before, `${ot.name}: ${act}`); addMeter(s,10); addMeter(d,4); speak(s, state.carrier==='captain'?'captain':'player', `${ot.name} work a ${act}.\nThe attack moves into ${ZONES[state.zone]}.`); log(`<b>${ot.name}</b> advance to ${ZONES[state.zone]}.`); } else { state.possession=d; state.zone = state.zone>=3?1:2; state.carrier=randomCarrier(false); setAnim('turnover', before, `${dt.name} win it back`); addMeter(s,4); addMeter(d,11); speak(d,'player',`${dt.name} read the buildup and win it back.\nA counterattack starts the other way.`); log(`<b>${dt.name}</b> recover possession.`); } }

function chooseDanger(choice){
  ensureAudio();
  const s=state.possession;
  if(choice==='setup'){ noteAction(s,'setup'); return createSetup(0,'cross'); }
  if(choice==='special'){ noteAction(s,'special'); return resolveShot('special'); }
  noteAction(s,'shot'); return resolveShot('shot');
}
function createSetup(bonus=0, source='cross'){
  const before=snapshotPlay();
  const s=state.possession,d=other(s),ot=team(s),dt=team(d);
  const captainForce = source==='captain' || source==='freeKick';
  if(captainForce) noteAction(s,'captain');
  if(state.zone>=3 && chance(captainForce?.08:.06)){
    state.phase='idle'; recordEvent('offside', s);
    showCinematic([{img:ASSETS.refOffside,title:'Offside',text:'Flag up! The run came too early.',sound:'click',vertical:true}], ()=>{
      state.possession=d; state.zone=1; state.carrier=randomCarrier(false); setAnim('turnover', before, 'Offside: possession flips');
      adjustBrazilMood(s,-1); adjustBrazilMood(d,1);
      speak(d,'player',`${ot.name} time the run badly.\nOffside flips possession.`);
      log(`<b>Offside:</b> ${ot.name} are called back.`); render();
    }); return;
  }
  const st = state.style?.[s] || {};
  const setupScore = effectiveStat(s,'setup') + bonus + playstyleSetupMod(s,source) + (state.zone===4?8:0) + rnd(22);
  const blockScore = effectiveStat(d,'build') + repetitionPenalty(s, captainForce?'captain':'setup') + rnd(28);
  let cleanChance = clamp(.50 + (setupScore-blockScore)/100, .24, .82);
  if(captainForce) cleanChance -= Math.min(.18, (st.captainForces||0)*.035);
  if(state.playMode==='campaign' && state.campaign?.difficulty==='hero' && s==='P') cleanChance += .08;
  cleanChance = clamp(cleanChance,.18,.88);
  const r=Math.random();
  if(r<cleanChance){
    recordEvent('chance', s);
    adjustBrazilMood(s,1);
    state.carrier= captainForce ? 'captain' : randomCarrier(true);
    const cleanBonus = source==='captain' ? 12 : source==='freeKick' ? 10 : (state.zone===4?11:8);
    setAnim('advance', before, source==='cross'?'Cross into the box':source==='freeKick'?'Free kick layoff':'Pass to captain');
    state.phase='finish';
    state.pending={bonus: cleanBonus, special:false, source};
    speak(s, captainForce?'captain':'player', source==='cross' ? 'The ball comes in cleanly. A better chance is opening.' : 'The pass arrives, but the finish still has to be earned.');
    log(`<b>${ot.name}</b> create a shooting chance.`);
  } else if(r<cleanChance+.16 && state.zone>=3){
    recordEvent('corner', s);
    showCinematic([{img:ASSETS.refCorner,title:'Corner Kick',text:'The pass is blocked behind. Corner kick!',sound:'click',vertical:true}], ()=>{
      state.phase='corner'; state.carrier='winger'; setAnim('corner', before, `${ot.name} corner kick`, ballPosFor(s,'winger',4));
      addMeter(s,8); addMeter(d,8); adjustBrazilMood(s,1);
      speak(s,'player','Blocked behind! Corner kick.'); log(`<b>Corner:</b> ${ot.name} force a corner.`); render();
    }); return;
  } else if(r<cleanChance+.29){
    state.possession = chance(.55)?d:s;
    state.zone = state.possession===s ? Math.max(2,state.zone-1) : 2;
    state.carrier=randomCarrier(false);
    state.phase='idle';
    setAnim('turnover', before, 'Loose ball scramble');
    speak(state.possession,'player',`The pass is messy. ${sideName(state.possession)} collect the loose ball.`);
    log(`<b>Loose Ball:</b> The pass is not clean.`);
    adjustBrazilMood(s,-1);
  } else {
    const overhit = chance(.45);
    state.possession=d; state.zone=overhit?1:2; state.carrier=overhit?'keeper':randomCarrier(false);
    state.phase='idle';
    setAnim('turnover', before, overhit?'Overhit pass':'Intercepted pass');
    speak(d,overhit?'goalie':'player', overhit ? 'Too much on the pass. Goalkeeper gathers it.' : `${dt.name} read that pass and cut it out.`, overhit?'Goalkeeper':null);
    log(`<b>${dt.name}</b> stop the setup.`);
    adjustBrazilMood(s,-1); adjustBrazilMood(d,1);
  }
  render();
}
function resolveFinish(){ const bonus = state.pending?.bonus || 8; state.pending=null; resolveShot('setup', bonus); }
function chooseCorner(kind){ 
  ensureAudio(); 
  const s=state.possession;
  if(kind==='header'){
    noteAction(s,'setup');
    state.carrier = s==='P' ? 'captain' : 'striker';
    return resolveShot('cornerHeader', s==='P'?12:4);
  }
  if(kind==='kick'){
    noteAction(s,'setup');
    state.carrier = s==='A' ? 'captain' : 'player';
    return resolveShot('cornerKick', s==='A'?12:4);
  }
  state.carrier='captain';
  addMeter(s,10);
  return createSetup(9,'captain');
}
function chooseFreeKick(kind){
  ensureAudio();
  const s=state.possession;
  if(kind==='shoot'){
    noteAction(s,'shot');
    state.carrier='captain';
    return resolveShot('freeKickShot', state.zone>=4?8:4);
  }
  state.carrier='captain';
  addMeter(s,10);
  return createSetup(9,'freeKick');
}

function triggerFreeKick(attacker, defender){
  const before=snapshotPlay();
  state.freeKickUsed=true;
  recordEvent('foul', defender, {against:attacker});
  state.zone = Math.max(state.zone, 3);
  state.possession=attacker;
  state.carrier='captain';
  state.phase='freekick';
  recordEvent('freeKick', attacker);
  log(`<b>Free Kick:</b> ${sideName(attacker)} win a set piece.`);
  showCinematic([
    {img:ASSETS.refFoul,title:'Foul!',text:'The referee blows for the challenge and stops play.',sound:'click',vertical:true},
    {img:ASSETS.refFreeKick,title:'Free Kick',text:`Free kick for ${sideName(attacker)}.
Shoot, or pass to set up the better shot.`,vertical:true}
  ], ()=>{
    setAnim('freekick', before, `${sideName(attacker)} free kick`, ballPosFor(attacker,'captain',state.zone));
    speak(attacker,'captain','Free kick. Shoot now, or set up the better chance.');
    render();
  });
}
function triggerPenalty(attacker){
  const before=snapshotPlay();
  const defender=other(attacker);
  state.penaltyUsed=true;
  recordEvent('penalty', attacker);
  const scored = chance(0.68);
  showCinematic([
    {img:ASSETS.refPenalty,title:'Penalty!',text:'The referee points straight to the spot!',sound:'click',vertical:true},
    {img: penaltyArt(attacker),title:'From the Spot',text:`${sideName(attacker)} prepare for the penalty kick.
The stadium goes silent.`,vertical:true},
    scored
      ? {img: goalArt(attacker),title:'Penalty Goal!',text:`He buries it!
${sideName(attacker)} take the lead.`,sound:'goal'}
      : {img: missArt(attacker),title:'Off the Post!',text:`The shot smashes the post!
${sideName(defender)} break the other way.`,sound:'miss'}
  ], ()=>{
    if(scored){
      state.score[attacker]++;
      recordEvent('goal', attacker, {penalty:true});
      addMeter(attacker,12); addMeter(defender,10);
      log(`<b class="good">Penalty Goal:</b> ${sideName(attacker)} score. ${state.score.P}-${state.score.A}.`);
      resetAfterGoal(defender);
      setAnim('kickoff', before, `${sideName(defender)} restart`, ballPosFor(defender,'player',2));
      speak(attacker,'captain','The pressure was huge, but the finish was calm.');
    } else {
      state.possession=defender;
      state.zone=3;
      state.carrier=randomCarrier(true);
      state.phase='danger';
      addMeter(defender,16);
      log(`<b>Penalty Miss:</b> Off the post. ${sideName(defender)} counterattack.`);
      setAnim('turnover', before, `${sideName(defender)} counterattack`, ballPosFor(defender,state.carrier,state.zone));
      speak(defender,'player','Off the post! Counterattack now!');
    }
    render();
  });
}

function resolveShot(kind, bonus=0){
  const before=snapshotPlay();
  const s=state.possession,d=other(s),ot=team(s),dt=team(d); state.phase='idle';
  const isSpecial = kind==='special';
  const shooterRole = isSpecial ? 'captain' : (state.carrier==='captain' ? 'captain' : 'player');
  const zoneBase = [3,6,13,32,47][state.zone];
  const stat = isSpecial ? effectiveStat(s,'special') : (kind==='setup' ? effectiveStat(s,'shot')+4 : kind==='freeKickShot' ? effectiveStat(s,'shot')+4 : kind==='cornerKick' ? effectiveStat(s,'shot')+3 : kind==='cornerHeader' ? effectiveStat(s,'power')+4 : effectiveStat(s,'power'));
  let goalChance = zoneBase + Math.round((stat-78)/3) + bonus + playstyleShotMod(s,kind,isSpecial) - keeperSaveMod(d,kind);
  if(kind==='shot') goalChance = Math.min(goalChance,56);
  if(kind==='setup') goalChance = Math.min(goalChance,64);
  if(isSpecial) goalChance = Math.min(goalChance,76);
  if(kind==='cornerHeader' || kind==='cornerKick') goalChance = Math.min(goalChance,62);
  if(kind==='freeKickShot') goalChance = Math.min(goalChance,55);
  goalChance = clamp(goalChance, 6, 82);
  let roll = rnd(100);
  recordEvent('shot', s, {kind, special:isSpecial, zone:state.zone, goalChance});
  if(isSpecial){ state.meter[s]=0; state.cool[s]=5; recordEvent('special', s, {zone:state.zone}); }
  setAnim(isSpecial?'special':'shot', before, isSpecial?`${ot.name} captain special`:`${ot.name} shot`, goalMouth(d));
  const wideMissGoalKick = ()=>{
    recordEvent('goalKick', d); log(`<b>Goal Kick:</b> ${dt.name} restart after the miss.`);
    adjustBrazilMood(s,-1); adjustBrazilMood(d,1);
    showCinematic([{img:ASSETS.refGoalKick,title:'Goal Kick',text:'The keeper prepares to restart play.',sound:'click'}], ()=>{
      addMeter(s,4); addMeter(d,8); state.possession=d; state.zone=1; state.carrier='keeper'; setAnim('goalKick', before, `${dt.name} goal kick`, ballPosFor(d,'keeper',1)); speak(d,'goalie','Goal kick. We settle it and play out from the back.','Goalkeeper'); render();
    });
  };
  const cornerEvent = ()=>{
    recordEvent('corner', s); log(`<b>Corner:</b> ${dt.name} concede a corner.`);
    showCinematic([{img:ASSETS.refCorner,title:'Corner Kick',text:'Another chance from the flag.',sound:'click',vertical:true}], ()=>{
      state.phase='corner'; state.carrier='winger'; setAnim('corner', before, `${ot.name} corner kick`, ballPosFor(s,'winger',4)); addMeter(s,8); addMeter(d,12); speak(d,'goalie','A touch sends it behind. Corner kick for the attack.','Goalkeeper'); render();
    });
  };
  const goalResult = ()=>{
    recordEvent('goal', s); if(isSpecial) recordEvent('specialGoal', s);
    state.score[s]++; addMeter(s,18); addMeter(d,8);
    adjustBrazilMood(s,2); adjustBrazilMood(d,-1);
    log(`<b class="good">GOAL:</b> ${ot.name} score. ${state.score.P}-${state.score.A}.`);
  };

  if(isSpecial){
    const success = roll < goalChance;
    if(!success){ recordEvent('specialMiss', s); adjustBrazilMood(s,-1); }
    showCinematic([
      {img: specialArt(s), title: `${ot.name} Captain Special`, text: `${ot.special}!\nThe captain unloads the signature move.`, sound:'special'},
      success
        ? {img: goalArt(s), title: 'GOOOAL!', text: `${ot.special} breaks through!\n${ot.name} take the moment!`, sound:'goal'}
        : {img: missArt(s), title: 'Denied!', text: `${ot.special} looked dangerous...\nbut the keeper or defense survives it.`, sound:'miss'}
    ], ()=>{
      if(success){ goalResult(); resetAfterGoal(d); setAnim('kickoff', before, `${dt.name} restart`, ballPosFor(d,'player',2)); }
      else {
        const near = roll < goalChance + 18;
        if(near && chance(.55)){ cornerEvent(); return; }
        state.possession=d; state.zone=1; state.carrier='keeper'; setAnim('save', before, `${dt.name} survive special`, ballPosFor(d,'keeper',1));
      }
      render();
    });
    return;
  }

  if(roll < goalChance){
    goalResult();
    const next = () => { resetAfterGoal(d); setAnim('kickoff', before, `${dt.name} restart`, ballPosFor(d,'player',2)); speak(s, shooterRole, `${ot.name} celebrate as the crowd roars!`); render(); };
    showCinematic([{img: goalArt(s), title:'GOOOAL!', text:`${ot.name} find the net!\nThe finish beats the keeper.`, sound:'goal'}], next);
    return;
  }

  const near = roll < goalChance + 18;
  if(near && chance(.65)){ cornerEvent(); return; }
  if(near){ 
    recordEvent('save', d); 
    log(`<b>Big Save:</b> ${dt.name} keeper keeps it out.`); 
    addMeter(s,6); addMeter(d,12); adjustBrazilMood(s,-1); adjustBrazilMood(d,1); 
    showCinematic([{img:ASSETS.bigSave,title:'Big Save!',text:`${dt.name} keeper flies across and keeps it out.`,sound:'click',vertical:true}], ()=>{
      state.possession=d; state.zone=1; state.carrier='keeper'; 
      setAnim('save', before, `${dt.name} keeper save`, ballPosFor(d,'keeper',1)); 
      speak(d,'goalie','The keeper judges it well and makes the save.','Goalkeeper'); 
      render(); 
    });
    return; 
  }
  if(state.zone>=3 && chance(.25)){ cornerEvent(); return; }
  wideMissGoalKick();
}

function resetAfterGoal(newPoss){ state.possession=newPoss; state.zone=2; state.carrier=randomCarrier(false); state.phase='idle'; state.minute=clamp(state.minute+1,0,90); }

function startPenalties(){ state.phase='penShoot'; state.pen={round:1, shooting:'P', score:{P:0,A:0}, target:null, history:[]}; speak('P','captain','Penalty shootout. Five kicks each. If still tied, sudden death.'); render(); }
function lockShot(dir){ ensureAudio(); state.pen.target=dir; state.phase='penLocked'; speak(state.pen.shooting,'captain','Shot selected and locked in.'); render(); }
function keeperGuess(){ ensureAudio(); state.phase='penKeeper'; speak(other(state.pen.shooting),'goalie','Read the shooter and commit.','Goalkeeper'); render(); }
function penaltyTaken(side){ return state.pen.history.filter(h=>h.s===side).length; }
function shootoutOver(){
  const p=state.pen, takenP=penaltyTaken('P'), takenA=penaltyTaken('A');
  const remP=Math.max(0,5-takenP), remA=Math.max(0,5-takenA);
  if(takenP<=5 && takenA<=5){
    if(p.score.P > p.score.A + remA) return true;
    if(p.score.A > p.score.P + remP) return true;
    if(takenP===5 && takenA===5 && p.score.P!==p.score.A) return true;
    return false;
  }
  if(takenP===takenA && takenP>=5 && p.score.P!==p.score.A) return true;
  return false;
}
function resolvePenalty(guess){
  ensureAudio();
  const p=state.pen,s=p.shooting,target=p.target;
  let scoreChance = target===guess ? 28 : (guess==='middle'||target==='middle' ? 76 : 90);
  scoreChance += s==='P'?3:5;
  const goal = chance(scoreChance/100);
  const finish = ()=>{ p.history.push({s,target,guess,goal}); if(shootoutOver()){ state.phase='penDone'; const winner = p.score.P>p.score.A?'P':'A'; triggerVictoryCelebration(winner,true); } else { state.phase='penResult'; render(); } };
  const intro = {img:s==='P'?ASSETS.penPt:ASSETS.penAr,title:'Penalty Kick',text:`${sideName(s)} step up from the spot.
The keeper reads the body shape and commits.`,sound:'click',vertical:true};
  if(goal){
    p.score[s]++;
    showCinematic([intro,{img:goalArt(s),title:'Penalty Goal!',text:`${sideName(s)} score from the spot.`,sound:'goal'}], ()=>{ speak(s,'captain',`He shoots ${target.toUpperCase()}!
It is in.`); finish(); });
  } else {
    showCinematic([intro,{img:missArt(s),title:'Penalty Miss!',text:`No goal! The shootout pressure rises.`,sound:'miss'}], ()=>{ speak(other(s),'goalie',`He guessed ${guess.toUpperCase()} and the shot was ${target.toUpperCase()}.
Saved!`,'Goalkeeper'); finish(); });
  }
}
function nextPenaltyKick(){ const p=state.pen; p.shooting = p.history.length % 2 === 0 ? 'P' : 'A'; p.round = Math.floor(p.history.length/2)+1; p.target=null; state.phase='penShoot'; speak(p.shooting,'captain',`${sideName(p.shooting)} step up for penalty ${p.round}.`); render(); }

function restartCurrentMatch(){ if(state.playMode==='campaign' && state.campaign) startCampaignMatch(); else startFaceoff(); }
function render(){ const app=document.getElementById('app'); app.innerHTML = state.mode==='splash' ? splashScreen() : state.mode==='menu' ? menuScreen() : state.mode==='how' ? howScreen() : state.mode==='campaignTeams' ? renderCampaignTeams() : state.mode==='campaignDifficulty' ? renderCampaignDifficulty() : state.mode==='campaignRoute' ? renderCampaignRoute() : renderMatch(); }

initState(); render();
setTimeout(()=>{ if(state && state.mode==='splash'){ state.splashReady=true; render(); } }, 3000);
</script></body></html>
