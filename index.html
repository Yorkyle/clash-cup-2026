.moveName{font-size:17px;font-weight:1000} .moveDesc{font-size:12px;color:var(--muted);margin-top:4px;text-transform:none;letter-spacing:0}

.campaignGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}

function storageGet(key, fallback=false){
  try { return localStorage.getItem(key)==='1'; } catch(e){ return fallback || mockBrazilUnlocked; }
}
function storageSet(key, val){
  try { localStorage.setItem(key, val?'1':'0'); } catch(e){ if(key==='cc26BrazilUnlocked') mockBrazilUnlocked=!!val; }
}
function storageGetNum(key, fallback=0){
  try {
    const raw = localStorage.getItem(key);
    const parsed = parseInt(raw || '', 10);
    return Number.isFinite(parsed) ? parsed : fallback;
  } catch(e){ return fallback; }
}
function setStorageNum(key, val){ try { localStorage.setItem(key, String(val)); } catch(e){} }
function getTeamStars(teamId){ return clamp(storageGetNum(`cc26Stars_${teamId}`,0),0,3); }

function experienceBoost(side,key){
  if(state.playMode!=='campaign' || !state.campaign || side!=='P') return 0;
  const stars = getTeamStars(teamId(side));
  const veteranBonus = hasVeteranExperience() ? 2 : 0;
  if(state.campaign.difficulty==='legend'){
    let boost = stars*3 + veteranBonus;
    if(key==='special') boost += stars;
    if(key==='setup' && teamId(side)==='argentina') boost += Math.min(2,stars);
    if(key==='power' && teamId(side)==='portugal' && hasLegendSpecial(teamId(side))) boost += 2;
    if(key==='shot' && teamId(side)==='brazil' && hasLegendSpecial(teamId(side))) boost += 2;
    return boost;
  }
  if(state.campaign.difficulty==='hero'){
    return stars>0 ? 1 + Math.floor(stars/2) : 0;
  }
  return 0;
}

function tuneCampaignMatch(){
  if(!state.campaign) return;
  const bump = (side, amount) => {
    Object.keys(teams[side].stats).forEach(k=>{
      if(typeof teams[side].stats[k]==='number') teams[side].stats[k]=clamp(teams[side].stats[k]+amount,45,99);
    });
  };
  if(state.campaign.difficulty==='hero'){
    bump('P',18);
    bump('A',-14);
    const current = campaignCurrent?.();
    if(current && current.type==='group') bump('A',-5);
  } else {
    bump('A',5);
  }
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickUnique(pool, used, count=1){
  const available = shuffle(pool.filter(x=>!used.has(x)));
  const picks = available.slice(0,count);
  picks.forEach(x=>used.add(x));
  return count===1 ? picks[0] : picks;
}
function buildCampaignRoute(playerId){
  const used = new Set([playerId]);
  const group = pickUnique(GROUP_POOL, used, 3).map((id,i)=>({stage:'Group Match '+(i+1), type:'group', opponent:id}));
  const semi = {stage:'Semifinal', type:'semi', opponent:pickUnique(SEMI_POOL, used, 1)};
  const final = {stage:'Final', type:'final', opponent:pickUnique(FINAL_POOL, used, 1)};
  return [...group, semi, final];
}

}

function noteAction(s, action){
  if(!state.style) state.style={P:{},A:{}};
  const st = state.style[s] || (state.style[s]={last:null,streak:0,shots:0,setups:0,captainForces:0,variety:0});
  if(st.last===action) st.streak=(st.streak||0)+1; else { st.variety=(st.variety||0)+1; st.streak=1; }
  st.last=action;
  if(action==='shot') st.shots=(st.shots||0)+1;
  if(action==='setup') st.setups=(st.setups||0)+1;
  if(action==='captain') st.captainForces=(st.captainForces||0)+1;
  return st;
}
function repetitionPenalty(s, action){
  const st = state.style?.[s]; if(!st || st.last!==action) return 0;
  if(action==='shot') return Math.max(0, st.streak-1) * 10;
  if(action==='captain') return Math.max(0, st.streak-1) * 8;
  return Math.max(0, st.streak-2) * 4;
}
function setupMemoryBonus(s){
  const st=state.style?.[s]; if(!st) return 0;
  return st.last==='setup' ? 8 : st.last==='captain' ? 5 : 0;
}
function playstyleShotMod(s, kind, isSpecial){
  const id=teamId(s), st=state.style?.[s] || {};
  let mod=0;
  if(kind==='shot') mod -= repetitionPenalty(s,'shot');
  if(kind==='shot' && st.last==='shot' && st.streak>=2) mod -= 8;
  if(kind==='shot' && id==='portugal') mod += 4;
  if(kind==='shot' && id==='argentina' && !setupMemoryBonus(s)) mod -= 6;
  if(kind==='setup') mod += setupMemoryBonus(s);
  if(isSpecial){
    if(id==='portugal') mod += 6 + (setupMemoryBonus(s)?4:0);
    if(id==='argentina') mod += 4 + (setupMemoryBonus(s)?8:0);
    if(id==='brazil') mod += 5 + brazilMoodBonus(s,'special');
    if(st.last==='shot' && st.streak>=2) mod -= 8;
  }
  if(state.playMode==='campaign' && state.campaign?.difficulty==='hero'){
    if(s==='P') mod += 10;
    if(s==='A') mod -= 14;
  }
  if(state.playMode==='campaign' && state.campaign?.difficulty==='legend'){
    if(s==='A') mod += 4;
  }
  return mod;
}
function playstyleSetupMod(s, source){
  const id=teamId(s), st=state.style?.[s] || {};
  let mod=0;
  if(id==='argentina') mod += 9;
  if(id==='portugal' && source==='cross') mod += 5;
  if(id==='brazil') mod += brazilMoodBonus(s,'setup');
  if(source==='captain' || source==='freeKick') mod -= repetitionPenalty(s,'captain');
  if(state.playMode==='campaign' && state.campaign?.difficulty==='hero'){
    if(s==='P') mod += 14;
    if(s==='A') mod -= 10;
  }
  return mod;
}
function brazilMoodBonus(s,key){

  const mood = state.brazilMood?.[s] || 0;
  if(key==='build') return mood*5;
  if(key==='setup') return mood*6;
  if(key==='shot' || key==='power' || key==='special') return mood*7;
  return mood*5;
}
function adjustBrazilMood(s, delta, hint=''){
  if(!isTeam(s,'brazil')) return;
  if(!state.brazilMood) state.brazilMood={P:0,A:0};
  const old=state.brazilMood[s]||0;
  state.brazilMood[s]=clamp(old+delta,-2,2);
  if(state.brazilMood[s]!==old && Math.abs(state.brazilMood[s])===2){
    const msg = state.brazilMood[s]>0 ? `${sideName(s)} are playing with joy now.` : `${sideName(s)} look emotional and shaky.`;

  }
}

function recordEvent(type, teamSide=null, detail={}){
  const ev = {type, team:teamSide, minute:state.minute, ...detail};
  state.events.push(ev);
  if(!teamSide || !state.stats[teamSide]) return ev;
  const st = state.stats[teamSide];
  if(type==='shot') st.shots++;
  if(type==='goal') st.goals++;
  if(type==='corner') st.corners++;
  if(type==='offside') st.offsides++;
  if(type==='yellow') st.yellows++;
  if(type==='save') st.saves++;
  if(type==='goalKick') st.goalKicks++;
  if(type==='freeKick') st.freeKicks++;
  if(type==='penalty') st.penalties++;
  if(type==='special'){ st.specials++; }
  if(type==='specialGoal'){ st.specialGoals++; }
  if(type==='specialMiss'){ st.specialMisses++; }
  if(type==='chance') st.chances++;
  return ev;
}
function countEvents(type, side=null, maxMinute=45){
  return state.events.filter(e => e.type===type && (side?e.team===side:true) && e.minute<=maxMinute).length;
}
function generateHalftimeRecap(){
  const nP=sideName('P'), nA=sideName('A'), cP=teamCode('P'), cA=teamCode('A');
  const pGoals=state.score.P, aGoals=state.score.A;
  const pShots=countEvents('shot','P'), aShots=countEvents('shot','A');
  const pCorners=countEvents('corner','P'), aCorners=countEvents('corner','A');
  const pFreeKicks=countEvents('freeKick','P'), aFreeKicks=countEvents('freeKick','A');
  const pYellows=countEvents('yellow','P'), aYellows=countEvents('yellow','A');
  const pOffsides=countEvents('offside','P'), aOffsides=countEvents('offside','A');
  const pSpecials=countEvents('special','P'), aSpecials=countEvents('special','A');
  const pSaves=countEvents('save','P'), aSaves=countEvents('save','A');

  let story = '';
  if(pGoals===aGoals){
    story = `The match is still right there for either side.`;
  } else {
    const leader = pGoals>aGoals ? nP : nA;
    const trailer = pGoals>aGoals ? nA : nP;
    story = `${leader} lead at the break, but ${trailer} are one big chance away from changing everything.`;
  }

  let chanceLine = '';
  if(pShots+aShots===0) chanceLine = 'No clean looks yet';
  else if(pShots>aShots+1) chanceLine = `${cP} pressure`;
  else if(aShots>pShots+1) chanceLine = `${cA} pressure`;
  else chanceLine = 'Balanced chances';

  let rhythm = 'Settled match';
  if(pFreeKicks+aFreeKicks>0) rhythm = 'Free kick changed rhythm';
  else if(pYellows+aYellows>0) rhythm = 'Referee managing tension';
  else if(pOffsides+aOffsides>0) rhythm = 'High line matters';
  else if(pSpecials+aSpecials>0) rhythm = 'Captain moment used';
  else if(pSaves+aSaves>0) rhythm = 'Keepers standing firm';

  return `<div class="halftimeCard">
    <div class="halfScore"><span class="teamCode">${cP}</span><span>${pGoals}</span><span class="scoreSep">—</span><span>${aGoals}</span><span class="teamCode">${cA}</span></div>
    <div class="halfStory">${story}</div>
    <div class="halfStats">
      <div class="halfStat"><div class="halfStatLabel">Shots</div><div class="halfStatValue">${cP} ${pShots} — ${aShots} ${cA}</div></div>
      <div class="halfStat"><div class="halfStatLabel">Corners</div><div class="halfStatValue">${cP} ${pCorners} — ${aCorners} ${cA}</div></div>
      <div class="halfStat"><div class="halfStatLabel">Match rhythm</div><div class="halfStatValue">${rhythm}</div></div>
    </div>
    <div class="halfFocus"><b>Second-half focus:</b> Watch the danger zone. One clean final ball could decide this.</div>
  </div>`;
}
function triggerYellow(offender, beneficiary, reason='Late challenge'){
  state.cards[offender]++;
  state.cardTimer[offender]=3;
  recordEvent('yellow', offender, {reason});
  if(state.possession===offender) state.zone = clamp(state.zone-1,0,4);
  if(beneficiary){ state.possession = beneficiary; state.zone = clamp(state.zone+1,0,4); state.carrier = randomCarrier(state.zone>=3); }
  log(`<b>Yellow Card:</b> ${sideName(offender)} are cautioned.`);
  showCinematic([{img:ASSETS.refYellow,title:'Yellow Card',text:`${sideName(offender)} are booked.
${reason}. They back off a little.`,sound:'click',vertical:true}], ()=>{
    speak(beneficiary || offender,'player', beneficiary ? `${sideName(beneficiary)} have space after the caution.` : `${sideName(offender)} must play more carefully now.`);
    state.phase='idle'; render();
  });
}
function cleanText(msg){ return String(msg||'').replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim(); }

}
function speak(side, role, text, nameOverride=null){
  let img = role==='commentator' ? ASSETS.commentatorHalftime : role==='goalie' ? ASSETS.bigSave : portraits[side][role] || portraits[side].captain || starArt(side);
  let name = nameOverride || (role==='commentator' ? 'Commentator' : role==='captain' ? `${team(side).name} Captain` : role==='goalie' ? 'Goalkeeper' : `${team(side).name} Player`);
  state.dialogue = {img, name, text};
  state.playNow = cleanText(`${name}: ${text}`);
}

function ensureAudio(){
  if(!audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx) audioCtx = new Ctx();
  }
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}
function noiseBuffer(duration=0.4){
  const sr = audioCtx.sampleRate; const len = Math.floor(sr*duration); const buffer = audioCtx.createBuffer(1,len,sr); const data = buffer.getChannelData(0);
  for(let i=0;i<len;i++) data[i] = (Math.random()*2-1)*(1-i/len);
  return buffer;
}
function tone(freq,start,duration,type='sine',gain=0.12){
  const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,start); osc.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.0001,start); g.gain.exponentialRampToValueAtTime(gain,start+0.01); g.gain.exponentialRampToValueAtTime(0.0001,start+duration);
  osc.start(start); osc.stop(start+duration+0.02); return osc;
}
function playGoalSound(){ if(!audioCtx) return; const now=audioCtx.currentTime; tone(392,now,0.22,'square',0.12); tone(523,now+0.12,0.28,'square',0.14); tone(659,now+0.28,0.5,'square',0.16); const src=audioCtx.createBufferSource(); const filter=audioCtx.createBiquadFilter(); const g=audioCtx.createGain(); src.buffer=noiseBuffer(0.9); filter.type='bandpass'; filter.frequency.value=900; g.gain.value=0.08; src.connect(filter); filter.connect(g); g.connect(audioCtx.destination); src.start(now); src.stop(now+0.9); }
function playSpecialSound(){ if(!audioCtx) return; const now=audioCtx.currentTime; const osc=audioCtx.createOscillator(); const g=audioCtx.createGain(); osc.type='sawtooth'; osc.connect(g); g.connect(audioCtx.destination); osc.frequency.setValueAtTime(180,now); osc.frequency.exponentialRampToValueAtTime(980,now+0.45); g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(0.12,now+0.05); g.gain.exponentialRampToValueAtTime(0.0001,now+0.55); osc.start(now); osc.stop(now+0.6); }
function playMissSound(){ if(!audioCtx) return; const now=audioCtx.currentTime; tone(330,now,0.18,'triangle',0.09); tone(247,now+0.14,0.28,'triangle',0.08); }
function playClick(){ if(!audioCtx) return; const now=audioCtx.currentTime; tone(700,now,0.05,'square',0.05); }
function playSound(name){ ensureAudio(); if(!audioCtx) return; if(name==='goal') playGoalSound(); else if(name==='special') playSpecialSound(); else if(name==='miss') playMissSound(); else playClick(); }

function showCinematic(steps, callback){ state.cinematic = {steps, index:0, callback}; render(); if(steps[0].sound) playSound(steps[0].sound); }
function nextCinematic(){ ensureAudio(); const cine = state.cinematic; if(!cine) return; cine.index++; if(cine.index < cine.steps.length){ render(); const s=cine.steps[cine.index]; if(s.sound) playSound(s.sound); return; } const cb = cine.callback; state.cinematic=null; if(cb) cb(); render(); }

function tokenPos(){
  const z = state.zone;
  const clampX = x => clamp(x, 34, 636);
  const attackX = state.possession==='P' ? [95,225,350,500,596][z] : [575,470,350,205,92][z];

  const p = {
    pK:[8,62], aK:[664,62],
    pP:[132,108], pCap:[222,48], pW:[168,22], pD:[78,72],
    aP:[536,108], aCap:[448,48], aW:[502,22], aD:[590,72]
  };

  if(state.possession==='P'){
    p.pP=[clampX(attackX),108];
    p.pCap=[clampX(attackX+4),48];
    p.pW=[clampX(attackX-58),22];
    p.pD=[clampX(attackX-160),72];

    p.aD=[clampX(attackX+94),72];
    p.aP=[clampX(attackX+132),108];
    p.aCap=[clampX(attackX+66),48];
    p.aW=[clampX(attackX+30),22];
  } else {
    p.aP=[clampX(attackX),108];
    p.aCap=[clampX(attackX-4),48];
    p.aW=[clampX(attackX+58),22];
    p.aD=[clampX(attackX+160),72];

    p.pD=[clampX(attackX-94),72];
    p.pP=[clampX(attackX-132),108];
    p.pCap=[clampX(attackX-66),48];
    p.pW=[clampX(attackX-30),22];
  }
  return p;
}
function ballPos(){ if(state.preKickoff) return [339,75]; return ballPosFor(state.possession,state.carrier,state.zone); }
function tokenPosFor(zone){
  const base = {
    P: {defender:[78,62], player:[130,104], captain:[220,44], striker:[260,94], winger:[175,30], keeper:[8,62]},
    A: {defender:[590,62], player:[536,102], captain:[448,44], striker:[405,94], winger:[495,30], keeper:[664,62]}
  };
  const shift = [0,40,80,120,165][zone];
  return {
    pCap:[base.P.captain[0]+shift*0.78, base.P.captain[1]], pP:[base.P.player[0]+shift*0.76, base.P.player[1]], pW:[base.P.winger[0]+shift*0.72, base.P.winger[1]], pD:[base.P.defender[0]+shift*0.52, base.P.defender[1]], pK:base.P.keeper,
    aCap:[base.A.captain[0]-shift*0.78, base.A.captain[1]], aP:[base.A.player[0]-shift*0.76, base.A.player[1]], aW:[base.A.winger[0]-shift*0.72, base.A.winger[1]], aD:[base.A.defender[0]-shift*0.52, base.A.defender[1]], aK:base.A.keeper
  }
}
function carrierKey(side, carrier){
  if(carrier==='captain') return side==='P'?'pCap':'aCap';
  if(carrier==='winger') return side==='P'?'pW':'aW';
  if(carrier==='striker') return side==='P'?'pP':'aP';
  if(carrier==='keeper') return side==='P'?'pK':'aK';
  if(carrier==='defender') return side==='P'?'pD':'aD';
  return side==='P'?'pP':'aP';
}
function ballPosFor(side, carrier, zone){ const p = tokenPosFor(zone); const key = carrierKey(side, carrier); return [p[key][0]+4,p[key][1]+4]; }
function snapshotPlay(){ return {possession:state.possession, carrier:state.carrier, zone:state.zone, ball:ballPos()}; }
function goalMouth(defendingSide){ return defendingSide==='P' ? [6,82] : [672,82]; }
function setAnim(kind, before, label, toOverride=null){ const to = toOverride || ballPos(); state.anim = {kind, label, from:before?.ball || to, to, possession:state.possession, stamp:Date.now()}; }

function campaignAutoChoice(){
  ensureAudio();
  if(state.aiThinking) return;
  state.aiThinking=true;
  const s=state.possession;
  const phrase = state.phase==='danger' ? `${sideName(s)} slow down for the final decision.` :
    state.phase==='finish' ? `${sideName(s)} prepare to finish the chance.` :
    state.phase==='corner' ? `${sideName(s)} gather around the corner flag.` :
    state.phase==='freekick' ? `${sideName(s)} stand over the free kick.` : `${sideName(s)} read the pitch.`;
  speak(s,'player',phrase,'Match Commentary');
  render();
  setTimeout(()=>{ state.aiThinking=false; campaignAutoChoiceNow(); }, 1800);
}
function campaignAutoChoiceNow(){
  ensureAudio();
  const phase=state.phase;
  if(state.playMode!=='campaign' || state.possession!=='A'){ render(); return; }
  const s=state.possession;
  if(phase==='danger'){
    const st=state.style?.[s] || {};
    if(specialReady(s) && chance(st.last==='shot' && st.streak>=2 ? .22 : .38)){
      speak(s,'captain',`${sideName(s)} captain steps into the moment. The AI chooses the special attack.`,'Match Commentary');
      return chooseDanger('special');
    }
    if(chance(isTeam(s,'argentina') ? .68 : .58)){
      speak(s,'player',`${sideName(s)} slow the attack down and look for the cleaner pass.`,'Match Commentary');
      return chooseDanger('setup');
    }
    speak(s,'player',`${sideName(s)} decide the opening is good enough and take the shot.`,'Match Commentary');
    return chooseDanger('shot');
  }
  if(phase==='finish'){
    speak(s,'player',`${sideName(s)} have created the chance. The finish is coming now.`,'Match Commentary');
    resolveFinish(); return;
  }
  if(phase==='corner'){
    const opts=['header','kick','captain'];
    const pick=opts[rnd(opts.length)];
    speak(s,'player',`${sideName(s)} choose their corner routine: ${pick==='captain'?'pass to the captain':pick}.`,'Match Commentary');
    chooseCorner(pick); return;
  }
  if(phase==='freekick'){
    const pick=chance(.55)?'pass':'shoot';
    speak(s,'captain',`${sideName(s)} ${pick==='shoot'?'go straight for goal':'use the free kick to set up the next chance'}.`,'Match Commentary');
    chooseFreeKick(pick); return;
  }
  render();
}
function campaignPostMatchExchange(winnerSide, draw=false, shootout=false){
  const playerId=state.campaign.team, oppId=campaignOpponentId();
  const playerWonMatch = winnerSide==='P';
  const steps=[];
  if(draw){
    steps.push({img:teamImg(playerId),title:`${sideName('P')} Star`,text:'Nothing separated us today. We will keep fighting.',vertical:true,sound:'click'});
    steps.push({img:teamImg(oppId),title:`${sideName('A')} Star`,text:'A fair result. We both had chances to win.',vertical:true});
  } else if(playerWonMatch){
    steps.push({img:teamImg(oppId),title:`${sideName('A')} Star`,text:campaignLine(oppId,'lose'),vertical:true,sound:'click'});
    steps.push({img:teamImg(playerId),title:`${sideName('P')} Star`,text:campaignLine(playerId,'win'),vertical:true});
  } else {
    steps.push({img:teamImg(playerId),title:`${sideName('P')} Star`,text:campaignLine(playerId,'lose'),vertical:true,sound:'click'});
    steps.push({img:teamImg(oppId),title:`${sideName('A')} Star`,text:campaignLine(oppId,'win'),vertical:true});
  }
  showCinematic(steps, ()=>{ state.phase='campaignBetween'; render(); });
}
function campaignFinishMatch(winnerSide=null, shootout=false){
  const c=state.campaign, current=campaignCurrent();
  const draw = !winnerSide;
  const playerWin = winnerSide==='P';
  if(current.type==='group'){
    if(draw) c.points += 1;
    else if(playerWin) c.points += 3;
  }
  const result={stage:current.stage,type:current.type,winner:winnerSide,draw,playerWin,score:`${state.score.P}-${state.score.A}`,shootout,penScore:(shootout&&state.pen&&state.pen.score)?`${state.pen.score.P}-${state.pen.score.A}`:null};
  c.last=result;
  if(!c.results) c.results=[];
  c.results[c.matchIndex]=result;
  if(current.type==='final' && playerWin){
    const teamId=c.team;
    const rewards=[];
    const veteranBefore = hasVeteranExperience();
    const oldStars = getTeamStars(teamId);
    const newStars = Math.min(3, oldStars + 1);
    if(newStars>oldStars){
      setTeamStars(teamId, newStars);
      rewards.push(`${TEAM_LIBRARY[teamId].name} experience is now ${teamStarsText(teamId)}.`);
    }
    if(teamId==='portugal' || teamId==='argentina') storageSet('cc26BrazilUnlocked', true);
    if(c.difficulty==='legend' && !hasLegendSpecial(teamId) && legendSpecialName(teamId)){
      unlockLegendSpecial(teamId);
      rewards.push(`Legend Special unlocked: ${legendSpecialName(teamId)}.`);
    }
    if(!veteranBefore && hasVeteranExperience()) rewards.push('World Cup Veterans unlocked. Team experience now helps in Legend Mode.');
    c.rewards = rewards;
  }
  campaignPostMatchExchange(winnerSide, draw, shootout);
}
function campaignAutoShootout(){
  const pPower = 55 + Math.round(effectiveStat('P','special')/5) + (state.campaign.difficulty==='hero'?10:0);
  const aPower = 52 + Math.round(effectiveStat('A','special')/5) + (state.campaign.difficulty==='legend'?6:0);
  let p=0,a=0;
  for(let i=0;i<5;i++){ if(chance(clamp(pPower,45,82)/100)) p++; if(chance(clamp(aPower,45,82)/100)) a++; }
  let guard=0;
  while(p===a && guard<10){ if(chance(clamp(pPower,45,82)/100)) p++; if(chance(clamp(aPower,45,82)/100)) a++; guard++; }
  if(p===a){ if(chance(.52)) p++; else a++; }
  state.pen={score:{P:p,A:a},history:[]};
  campaignFinishMatch(p>a?'P':'A', true);
}
function campaignBetweenControls(){
  const c=state.campaign, last=c.last;
  const penText = last && last.shootout && last.penScore ? ` Won on penalties ${last.penScore}.` : '';
  if(!last) return `<div><button class="btn gold" onclick="startCampaignMatch()">Continue Campaign</button></div>`;
  if(last.type==='group'){
    if(c.matchIndex < 2){
      return `<div><b>${last.draw?'Match Drawn':last.playerWin?'Match Won':'Match Lost'}</b><p class="small">Group points: ${c.points}. The tournament continues.</p><button class="btn gold" onclick="campaignNext()">Next Match</button></div>`;
    }
    if(c.points>=4){
      return `<div><b>Group Stage Complete</b><p class="small">${c.points} points. You advance to the Semifinal.</p><button class="btn gold" onclick="campaignNext()">Advance</button></div>`;
    }
    if(c.points===3){
      return `<div><b>Group Playoff</b><p class="small">Three points keeps you alive. You advance by tiebreaker into the Semifinal.</p><button class="btn gold" onclick="campaignNext()">Advance by Tiebreaker</button></div>`;
    }
    return `<div><div class="bigEnd">Tournament Over</div><p class="small">You were eliminated in the group stage with ${c.points} points.</p><div class="centerBottom"><button class="btn red" onclick="resetCampaign()">Reset Tournament</button></div></div>`;
  }
  if(last.type==='semi' && !last.playerWin){
    return `<div><div class="bigEnd">Tournament Over</div><p class="small">You were eliminated in the Semifinal.${penText}</p><div class="centerBottom"><button class="btn red" onclick="resetCampaign()">Reset Tournament</button></div></div>`;
  }
  if(last.type==='final' && !last.playerWin){
    return `<div><div class="bigEnd">GAME OVER</div><p class="small">You fell in the Final.${penText}</p><div class="centerBottom"><button class="btn red" onclick="resetCampaign()">Reset Tournament</button></div></div>`;
  }
  if(last.type==='final' && last.playerWin){
    const teamId=c.team;
    const rewardLines = (c.rewards||[]).map(r=>`<p class="small">${r}</p>`).join('');
    const specialLine = hasLegendSpecial(teamId) && legendSpecialName(teamId) ? `<p class="small">Current team special: ${legendSpecialName(teamId)}.</p>` : '';
    const extra = teamId==='brazil'
      ? '<p class="small">Brazil are champions again.</p>'
      : '<p class="small">Brazil is now unlocked for future campaigns.</p>';
    return `<div><div class="bigEnd">Champions</div><p class="small">${sideName('P')} won the Clash Cup!${penText}</p>${rewardLines}${specialLine}${extra}<div class="centerBottom"><button class="btn gold" onclick="resetCampaign()">Play Campaign Again</button></div></div>`;
  }
  return `<div><b>Match Won</b><p class="small">You advance.${penText}</p><button class="btn gold" onclick="campaignNext()">Next Match</button></div>`;
}

function nextPlayDelay(){

function defenseControls(){
  const late = state.minute>=70 || state.score.P<state.score.A;
  const urgency = late ? 'Time is getting tight. You can take a bigger risk to win it back.' : 'Choose how to defend the danger.';
  return `<div><div class="row"><b>${sideName('A')} threaten your goal</b><span class="pill">Defensive choice</span></div><p class="small">${urgency}</p><div class="defenseGrid"><button class="btn" onclick="resolveDefense('hold')"><div class="moveName">Hold Shape</div><div class="moveDesc">Safest. Blocks space and avoids cards.</div></button><button class="btn gold" onclick="resolveDefense('steal')"><div class="moveName">Press / Steal</div><div class="moveDesc">Balanced. Win the ball and counter.</div></button><button class="btn red" onclick="resolveDefense('tackle')"><div class="moveName">Hard Tackle</div><div class="moveDesc">High reward, yellow-card risk.</div></button></div></div>`;
}
function resolveDefense(choice){
  ensureAudio();
  if(state.playMode!=='campaign' || state.possession!=='A' || state.phase!=='danger'){ render(); return; }
  const before=snapshotPlay();
  const late = state.minute>=70 || state.score.P<state.score.A;
  let steal=0, foul=0, block=0;
  if(choice==='hold'){ steal=.16; foul=.02; block=.66; }
  else if(choice==='steal'){ steal=late?.58:.48; foul=late?.14:.10; block=.18; }
  else { steal=late?.64:.56; foul=late?.34:.26; block=.10; }
  const roll=Math.random();
  recordEvent('defense','P',{choice,minute:state.minute});
  if(roll < foul){
    log(`<b>Defensive Risk:</b> ${sideName('P')} foul while trying to stop the attack.`);
    if(choice==='tackle' && state.zone>=4 && chance(late?.20:.12)){ triggerPenalty('A'); return; }
    if(choice==='tackle' || chance(.55)){ triggerYellow('P','A', choice==='tackle'?'Hard tackle to stop the attack':'Aggressive pressing foul'); return; }
    triggerFreeKick('A','P'); return;
  }
  if(roll < foul + steal){
    state.possession='P';
    state.carrier=randomCarrier(late);
    state.zone=late ? 3 : 2;
    state.phase=late ? 'danger' : 'idle';
    addMeter('P', late?12:9); addMeter('A',4);
    setAnim('turnover', before, `${sideName('P')} win the ball`, ballPosFor('P',state.carrier,state.zone));
    log(`<b>Steal:</b> ${sideName('P')} win the ball back${late?' and counter fast.':'.'}`);
    speak('P','player', late?'We stole it! Counter now!':'Good pressure. We win the ball and reset.','Defensive Stop');
    render(); return;
  }
  if(roll < foul + steal + block){
    state.possession='P';
    state.zone=2;
    state.carrier=randomCarrier(false);
    state.phase='idle';
    addMeter('P',8); addMeter('A',5);
    setAnim('turnover', before, `${sideName('P')} hold shape`, ballPosFor('P',state.carrier,state.zone));
    log(`<b>Blocked:</b> ${sideName('P')} hold shape and stop the danger.`);
    speak('P','player','We stayed organized and blocked the lane.','Defensive Stop');
    render(); return;
  }
  log(`<b>Pressure:</b> ${sideName('A')} survive the defensive pressure.`);
  speak('A','player',`${sideName('A')} keep the attack alive. Your defense has to survive the final action.`,'Opponent Attack');
  campaignAutoChoice();
}
function dangerControls(){

function fulltimeControls(){ if(state.playMode==='campaign') return campaignFulltimeControls(); const winner = state.score.P===state.score.A ? null : (state.score.P>state.score.A?'P':'A'); if(winner) return `<div><b>Final whistle.</b><p class="small">${sideName(winner)} win ${state.score.P}-${state.score.A}.</p><button class="btn gold" onclick="startFaceoff()">Play Again</button></div>`; return `<div><b>Full time level.</b><p class="small">It ends ${state.score.P}-${state.score.A}. The match goes to penalties: five kicks each, then sudden death if still tied.</p><button class="btn red" onclick="startPenalties()">Start Penalty Shootout</button></div>`; }
function penaltyControls(){ const p=state.pen; if(!p) return ''; if(state.phase==='penShoot'){ let s=p.shooting; return `<div><b>${sideName(s)} Penalty ${p.round}</b><p class="small">Shooter secretly selects Left, Middle, or Right while the other player looks away.</p><div class="penGrid"><button class="btn" onclick="lockShot('left')">Left</button><button class="btn" onclick="lockShot('middle')">Middle</button><button class="btn" onclick="lockShot('right')">Right</button></div>`; } if(state.phase==='penLocked') return `<div><div class="locked">LOCKED IN</div><p class="small">Pass the phone to the goalkeeper player.</p><button class="btn gold" onclick="keeperGuess()">Continue</button></div>`; if(state.phase==='penKeeper') return `<div><b>Goalkeeper Guess</b><p class="small">Guess where the shot is going.</p><div class="penGrid"><button class="btn" onclick="resolvePenalty('left')">Left</button><button class="btn" onclick="resolvePenalty('middle')">Middle</button><button class="btn" onclick="resolvePenalty('right')">Right</button></div>`; if(state.phase==='penDone'){ const leader = p.score.P>p.score.A?'P':'A'; return `<div><b>Shootout finished.</b><p class="small">${sideName(leader)} win the shootout ${p.score.P}-${p.score.A}.</p><button class="btn gold" onclick="startFaceoff()">Play Again</button></div>`; } if(state.phase==='penResult'){ const nextLabel = p.history.length>=10 && p.score.P===p.score.A ? 'Sudden Death Kick' : 'Next Kick'; return `<div><b>Penalty Result</b><p class="small">${p.score.P}-${p.score.A} after ${p.history.length} kicks.</p><button class="btn gold" onclick="nextPenaltyKick()">${nextLabel}</button></div>`; } return ''; }
function cinematicHTML(){ const step = state.cinematic.steps[state.cinematic.index]; const vert = step.vertical ? ' vertical' : ''; const slim = step.vertical ? ' slim' : ''; const half = step.title==='Halftime Report' ? ' halftimeCine' : ''; return `<div class="overlay" onclick="nextCinematic()"><div class="cineCard${slim}${half}"><div class="cineImage${vert}" style="background-image:url('${step.img}')"></div><div class="cineText"><div class="cineTitle">${step.title}</div><div class="cineBody">${step.text}</div><div class="tapNote">Tap anywhere to continue</div></div></div></div>`; }

function stoppageMinutes(){
  let s=0;
  const goals = state.score.P + state.score.A;
  if(countEvents('penalty','P') + countEvents('penalty','A') > 0) s += 1;
  if(countEvents('freeKick','P') + countEvents('freeKick','A') > 0) s += 1;
  if(countEvents('yellow','P') + countEvents('yellow','A') > 0) s += 1;
  if(goals>=4) s += 1;
  if(goals>=6) s += 1;
  return clamp(s,0,8);
}
function finalTargetMinute(){
  if(state.finalMinute==null) state.finalMinute = 90 + stoppageMinutes();
  return state.finalMinute;
}
function matchMinuteStep(){
  if(state.playMode==='faceoff') return 3 + rnd(3);
  return 4 + rnd(4);
}
function playBeatDelayMs(){
  return 1600;
}
function enterFulltime(){
  state.phase='fulltime';
  state.minute = finalTargetMinute();
  if(state.playMode==='campaign'){
    speak('P','commentator',`Full time: ${state.score.P}-${state.score.A}.`,'Final Whistle');
    render(); return;
  }
  if(state.score.P!==state.score.A){
    const winner = state.score.P>state.score.A?'P':'A';
    triggerVictoryCelebration(winner,false); return;
  }
  speak('P','commentator',`Full time: ${state.score.P}-${state.score.A}.`,'Final Whistle');
  render();
}
function nextPlay(){
  ensureAudio();
  if(state.cinematic) return;
  if(state.phase!=='idle'){ render(); return; }
  if(state.minute>=90 && state.minute>=finalTargetMinute()){ enterFulltime(); return; }
  state.turn++;
  const inc = matchMinuteStep();
  let maxClock = state.finalMinute || 98;
  let projected = clamp(state.minute + inc, 0, maxClock);
  if(!state.halftimeShown && projected>=45){
    state.minute = 45;
    state.halftimeShown=true;
    state.halftimeTie = state.score.P === state.score.A;
    showCinematic([{img:ASSETS.commentatorHalftime,title:'Halftime Report',text:generateHalftimeRecap(),sound:'click'}], ()=>{
      speak('P','commentator',`Halftime: ${sideName('P')} ${state.score.P} - ${state.score.A} ${sideName('A')}. The second half begins with everything still to play for.`,'Commentator');
      state.phase='idle'; render();
    });
    return;
  }
  if(projected>=90 && state.finalMinute==null){
    state.finalMinute = 90 + stoppageMinutes();
    projected = Math.min(projected, state.finalMinute);
  }
  state.minute = projected;
  state.cool.P=Math.max(0,state.cool.P-1);
  state.cool.A=Math.max(0,state.cool.A-1);
  decayTurnEffects();
  if(state.zone>=3){
    const s=state.possession;
    if(penaltyAllowed(s,'general') && chance(0.12)){ triggerPenalty(s); return; }
    state.phase='danger';
    speak(s, state.carrier==='captain'?'captain':'player', s==='P'?'This is the moment. Put us through.':'We are close now. Pick the final action.');
    render(); return;
  }
  simulateGame();
  render();
}

function randomCarrier(close=false){ let r=Math.random(); if(close){ if(r<.45)return 'captain'; if(r<.72)return 'player'; if(r<.88)return 'winger'; return 'striker'; } if(r<.28)return 'captain'; if(r<.57)return 'player'; if(r<.79)return 'winger'; return 'striker'; }
function simulateGame(){ const before=snapshotPlay(); const s=state.possession,d=other(s),ot=team(s),dt=team(d); state.carrier=randomCarrier(false); const acts=['short passing move','switch of play','dribble into space','long diagonal ball','one-two combination']; const act=acts[rnd(acts.length)]; const rallyChance = injuryRallyChance(); if(rallyChance>0 && chance(rallyChance)){ triggerRally(rallyTarget()); return; } const fkChance = freeKickChance(); if(fkChance>0 && chance(fkChance)){ setAnim('freekick', before, 'Foul: free kick'); triggerFreeKick(s,d); return; } if(yellowAllowed() && chance(0.08)){ setAnim('turnover', before, 'Whistle: late challenge'); triggerYellow(d,s,'A late sliding challenge'); return; } const atk = 50 + effectiveStat(s,'build')/3 + rnd(28) + (state.carrier==='captain'?8:0); const def = 50 + effectiveStat(d,'build')/3 + rnd(30); if(atk>=def){ const gain = (act.includes('long') || act.includes('one-two')) && chance(.45) ? 2 : 1; state.zone = clamp(state.zone + gain,0,4); state.carrier = randomCarrier(state.zone>=3); setAnim('advance', before, `${ot.name}: ${act}`); addMeter(s,10); addMeter(d,4); speak(s, state.carrier==='captain'?'captain':'player', `${ot.name} work a ${act}.\nThe attack moves into ${ZONES[state.zone]}.`); log(`<b>${ot.name}</b> advance to ${ZONES[state.zone]}.`); } else { state.possession=d; state.zone = state.zone>=3?1:2; state.carrier=randomCarrier(false); setAnim('turnover', before, `${dt.name} win it back`); addMeter(s,4); addMeter(d,11); speak(d,'player',`${dt.name} read the buildup and win it back.\nA counterattack starts the other way.`); log(`<b>${dt.name}</b> recover possession.`); } }

function chooseDanger(choice){
  ensureAudio();
  const s=state.possession;
  if(choice==='setup'){ noteAction(s,'setup'); return createSetup(0,'cross'); }
  if(choice==='special'){ noteAction(s,'special'); return resolveShot('special'); }
  noteAction(s,'shot'); return resolveShot('shot');
}
function createSetup(bonus=0, source='cross'){
  const before=snapshotPlay();
  const s=state.possession,d=other(s),ot=team(s),dt=team(d);
  const captainForce = source==='captain' || source==='freeKick';
  if(captainForce) noteAction(s,'captain');
  if(state.zone>=3 && chance(captainForce?.08:.06)){
    state.phase='idle'; recordEvent('offside', s);
    showCinematic([{img:ASSETS.refOffside,title:'Offside',text:'Flag up! The run came too early.',sound:'click',vertical:true}], ()=>{
      state.possession=d; state.zone=1; state.carrier=randomCarrier(false); setAnim('turnover', before, 'Offside: possession flips');
      adjustBrazilMood(s,-1); adjustBrazilMood(d,1);
      speak(d,'player',`${ot.name} time the run badly.\nOffside flips possession.`);
      log(`<b>Offside:</b> ${ot.name} are called back.`); render();
    }); return;
  }
  if(source==='cross' && state.zone>=3 && penaltyAllowed(s,'cross') && chance(crossPenaltyChance(s))){
    log(`<b>Penalty Appeal:</b> ${ot.name} whip a cross into the area and draw contact.`);
    triggerPenalty(s);
    return;
  }
  const st = state.style?.[s] || {};
  const setupScore = effectiveStat(s,'setup') + bonus + playstyleSetupMod(s,source) + (state.zone===4?8:0) + rnd(22);
  const blockScore = effectiveStat(d,'build') + repetitionPenalty(s, captainForce?'captain':'setup') + rnd(28);
  let cleanChance = clamp(.50 + (setupScore-blockScore)/100, .24, .82);
  if(captainForce) cleanChance -= Math.min(.18, (st.captainForces||0)*.035);
  if(state.playMode==='campaign' && state.campaign?.difficulty==='hero' && s==='P') cleanChance += .08;
  cleanChance = clamp(cleanChance,.18,.88);
  const r=Math.random();
  if(r<cleanChance){
    recordEvent('chance', s);
    adjustBrazilMood(s,1);
    state.carrier= captainForce ? 'captain' : randomCarrier(true);
    const cleanBonus = source==='captain' ? 12 : source==='freeKick' ? 10 : (state.zone===4?11:8);
    setAnim('advance', before, source==='cross'?'Cross into the box':source==='freeKick'?'Free kick layoff':'Pass to captain');
    state.phase='finish';
    state.pending={bonus: cleanBonus, special:false, source};
    speak(s, captainForce?'captain':'player', source==='cross' ? 'The ball comes in cleanly. A better chance is opening.' : 'The pass arrives, but the finish still has to be earned.');
    log(`<b>${ot.name}</b> create a shooting chance.`);
  } else if(r<cleanChance+.16 && state.zone>=3){
    const keptByAttack = chance(.42);
    state.possession = keptByAttack ? s : d;
    state.zone = keptByAttack ? Math.max(2,state.zone-1) : 2;
    state.carrier=randomCarrier(false);
    state.phase='idle';
    const blockedLabel = source==='cross' ? 'Blocked cross in the box' : source==='freeKick' ? 'Free kick pass blocked' : 'Setup pass blocked';
    setAnim('turnover', before, blockedLabel);
    if(keptByAttack){
      addMeter(s,5); addMeter(d,5);
      speak(s,'player', source==='cross' ? 'The cross is blocked, but the attack keeps pressure. No corner unless the finish is deflected.' : 'The setup is blocked, but the attack keeps the ball.');
      log(`<b>Blocked Setup:</b> ${ot.name} keep the ball, but no corner is awarded from the setup pass.`);
    } else {
      addMeter(s,3); addMeter(d,9);
      speak(d,'player', source==='cross' ? `${dt.name} block the cross and clear it. Corner kicks only come from deflected shots now.` : `${dt.name} read the setup and clear it.`);
      log(`<b>Blocked Setup:</b> ${dt.name} clear the pass. No corner.`);
      adjustBrazilMood(d,1);
    }
    adjustBrazilMood(s,-1);
  } else if(r<cleanChance+.29){
    state.possession = chance(.55)?d:s;
    state.zone = state.possession===s ? Math.max(2,state.zone-1) : 2;
    state.carrier=randomCarrier(false);
    state.phase='idle';
    setAnim('turnover', before, 'Loose ball scramble');
    speak(state.possession,'player',`The pass is messy. ${sideName(state.possession)} collect the loose ball.`);
    log(`<b>Loose Ball:</b> The pass is not clean.`);
    adjustBrazilMood(s,-1);
  } else {
    const overhit = chance(.45);
    state.possession=d; state.zone=overhit?1:2; state.carrier=overhit?'keeper':randomCarrier(false);
    state.phase='idle';
    setAnim('turnover', before, overhit?'Overhit pass':'Intercepted pass');
    speak(d,overhit?'goalie':'player', overhit ? 'Too much on the pass. Goalkeeper gathers it.' : `${dt.name} read that pass and cut it out.`, overhit?'Goalkeeper':null);
    log(`<b>${dt.name}</b> stop the setup.`);
    adjustBrazilMood(s,-1); adjustBrazilMood(d,1);
  }
  render();
}
function resolveFinish(){ const bonus = state.pending?.bonus || 8; state.pending=null; resolveShot('setup', bonus); }
function chooseCorner(kind){ 
  ensureAudio(); 
  const s=state.possession;
  if(kind==='header'){
    noteAction(s,'setup');
    state.carrier = s==='P' ? 'captain' : 'striker';
    return resolveShot('cornerHeader', s==='P'?12:4);
  }
  if(kind==='kick'){
    noteAction(s,'setup');
    state.carrier = s==='A' ? 'captain' : 'player';
    return resolveShot('cornerKick', s==='A'?12:4);

}
function chooseFreeKick(kind){
  ensureAudio();
  const s=state.possession;
  if(kind==='shoot'){
    noteAction(s,'shot');
    state.carrier='captain';
    return resolveShot('freeKickShot', state.zone>=4?8:4);
  }
  state.carrier='captain';
  addMeter(s,10);
  return createSetup(9,'freeKick');
}

function triggerFreeKick(attacker, defender){
  const before=snapshotPlay();
  state.freeKickUsed=true;
  recordEvent('foul', defender, {against:attacker});
  state.zone = Math.max(state.zone, 3);
  state.possession=attacker;
  state.carrier='captain';
  state.phase='freekick';
  recordEvent('freeKick', attacker);
  log(`<b>Free Kick:</b> ${sideName(attacker)} win a set piece.`);
  showCinematic([
    {img:ASSETS.refFoul,title:'Foul!',text:'The referee blows for the challenge and stops play.',sound:'click',vertical:true},
    {img:ASSETS.refFreeKick,title:'Free Kick',text:`Free kick for ${sideName(attacker)}.
Shoot, or pass to set up the better shot.`,vertical:true}
  ], ()=>{
    setAnim('freekick', before, `${sideName(attacker)} free kick`, ballPosFor(attacker,'captain',state.zone));
    speak(attacker,'captain','Free kick. Shoot now, or set up the better chance.');
    render();
  });
}
function triggerPenalty(attacker){
  const before=snapshotPlay();
  const defender=other(attacker);
  if(typeof state.penaltyUsed !== 'object' || state.penaltyUsed === null) state.penaltyUsed={P:false,A:false};
  state.penaltyUsed[attacker]=true;
  recordEvent('penalty', attacker);
  const scored = chance(0.82);
  showCinematic([
    {img:ASSETS.refPenalty,title:'Penalty!',text:'The referee points straight to the spot!',sound:'click',vertical:true},
    {img: penaltyArt(attacker),title:'From the Spot',text:`${sideName(attacker)} prepare for the penalty kick.
The stadium goes silent.`,vertical:true},
    scored
      ? {img: goalArt(attacker),title:'Penalty Goal!',text:`He buries it!
${sideName(attacker)} take the lead.`,sound:'goal'}
      : {img: missArt(attacker),title:'Off the Post!',text:`The shot smashes the post!
${sideName(defender)} break the other way.`,sound:'miss'}
  ], ()=>{
    if(scored){
      state.score[attacker]++;
      recordEvent('goal', attacker, {penalty:true});
      addMeter(attacker,12); addMeter(defender,10);
      log(`<b class="good">Penalty Goal:</b> ${sideName(attacker)} score. ${state.score.P}-${state.score.A}.`);
      resetAfterGoal(defender);
      setAnim('kickoff', before, `${sideName(defender)} restart`, ballPosFor(defender,'player',2));
      speak(attacker,'captain','The pressure was huge, but the finish was calm.');
    } else {
      state.possession=defender;
      state.zone=3;
      state.carrier=randomCarrier(true);
      state.phase='danger';
      addMeter(defender,16);
      log(`<b>Penalty Miss:</b> Off the post. ${sideName(defender)} counterattack.`);
      setAnim('turnover', before, `${sideName(defender)} counterattack`, ballPosFor(defender,state.carrier,state.zone));
      speak(defender,'player','Off the post! Counterattack now!');
    }
    render();
  });
}

function resolveShot(kind, bonus=0){
  const before=snapshotPlay();
  const s=state.possession,d=other(s),ot=team(s),dt=team(d); state.phase='idle';
  const isSpecial = kind==='special';
  const shooterRole = isSpecial ? 'captain' : (state.carrier==='captain' ? 'captain' : 'player');
  const zoneBase = [3,6,13,32,47][state.zone];
  const stat = isSpecial ? effectiveStat(s,'special') : (kind==='setup' ? effectiveStat(s,'shot')+4 : kind==='freeKickShot' ? effectiveStat(s,'shot')+4 : kind==='cornerKick' ? effectiveStat(s,'shot')+3 : kind==='cornerHeader' ? effectiveStat(s,'power')+4 : effectiveStat(s,'power'));
  let goalChance = zoneBase + Math.round((stat-78)/3) + bonus + playstyleShotMod(s,kind,isSpecial) - keeperSaveMod(d,kind);
  const legendMove = isSpecial && isLegendMoveActive(s);
  if(legendMove){
    if(isTeam(s,'portugal')) goalChance += 18;
    else if(isTeam(s,'argentina')) goalChance += 20;
    else if(isTeam(s,'brazil')) goalChance += 19;
  }
  if(kind==='shot') goalChance = Math.min(goalChance,56);
  if(kind==='setup') goalChance = Math.min(goalChance,64);
  if(isSpecial) goalChance = Math.min(goalChance, legendMove?94:76);
  if(kind==='cornerHeader' || kind==='cornerKick') goalChance = Math.min(goalChance,62);
  if(kind==='freeKickShot') goalChance = Math.min(goalChance,55);
  goalChance = clamp(goalChance, 6, legendMove?95:82);
  let roll = rnd(100);
  recordEvent('shot', s, {kind, special:isSpecial, zone:state.zone, goalChance});
  if(isSpecial){ state.meter[s]=0; state.cool[s]=5; recordEvent('special', s, {zone:state.zone}); }
  setAnim(isSpecial?'special':'shot', before, isSpecial?`${ot.name} captain special`:`${ot.name} shot`, goalMouth(d));
  const wideMissGoalKick = ()=>{
    recordEvent('goalKick', d); log(`<b>Goal Kick:</b> ${dt.name} restart after the miss.`);
    adjustBrazilMood(s,-1); adjustBrazilMood(d,1);
    showCinematic([{img:ASSETS.keeperGoalKick,title:'Shot Goes Wide!',text:'The shot drifts wide.\nThe keeper launches it back into play.',sound:'click',vertical:true}], ()=>{
      addMeter(s,4); addMeter(d,8); state.possession=d; state.zone=1; state.carrier='keeper'; setAnim('goalKick', before, `${dt.name} goal kick`, ballPosFor(d,'keeper',1)); speak(d,'goalie','Goal kick. We settle it and play out from the back.','Goalkeeper'); render();
    });
  };
  const cornerEvent = ()=>{
    recordEvent('corner', s); log(`<b>Corner:</b> ${dt.name} concede a corner.`);
    showCinematic([{img:ASSETS.refCorner,title:'Corner Kick',text:'Another chance from the flag.',sound:'click',vertical:true}], ()=>{
      state.phase='corner'; state.carrier='winger'; setAnim('corner', before, `${ot.name} corner kick`, ballPosFor(s,'winger',4)); addMeter(s,8); addMeter(d,12); speak(d,'goalie','A touch sends it behind. Corner kick for the attack.','Goalkeeper'); render();
    });
  };
  const goalResult = ()=>{
    recordEvent('goal', s); if(isSpecial) recordEvent('specialGoal', s);
    state.score[s]++; addMeter(s,18); addMeter(d,8);
    adjustBrazilMood(s,2); adjustBrazilMood(d,-1);
    log(`<b class="good">GOAL:</b> ${ot.name} score. ${state.score.P}-${state.score.A}.`);
  };
  const crossbarEvent = ()=>{
    log(`<b>Crossbar:</b> ${ot.name} hit the bar. Close call!`);
    addMeter(s,7); addMeter(d,7);
    adjustBrazilMood(s,-1);
    showCinematic([{
      img: missArt(s),
      title:'Off the Crossbar!',
      text:`Close call!
${ot.name} smash the ball against the crossbar, but it stays out.`,
      sound:'miss'
    }], ()=>{
      const reboundAlive = state.zone>=4 && chance(.22);
      if(reboundAlive){
        state.possession=s;
        state.zone=3;
        state.carrier=randomCarrier(true);
        state.phase='danger';
        setAnim('shot', before, `${ot.name} crossbar rebound`, ballPosFor(s,state.carrier,state.zone));
        speak(s,'player','It crashes off the bar! The rebound is still alive.');
      } else {
        state.possession=d;
        state.zone=2;
        state.carrier=randomCarrier(false);
        state.phase='idle';
        setAnim('turnover', before, `${dt.name} clear crossbar rebound`, ballPosFor(d,state.carrier,state.zone));
        speak(d,'player','Off the bar! We clear the rebound.');
      }
      render();
    });
  };

  if(isSpecial){
    const success = legendMove ? true : roll < goalChance;
    if(!success){ recordEvent('specialMiss', s); adjustBrazilMood(s,-1); }
    showCinematic([
      {img: specialArt(s), title: `${ot.name} Captain Special`, text: legendMove ? `${ot.special}!\nThe guaranteed legend finish is unleashed.` : `${ot.special}!\nThe captain unloads the signature move.`, sound:'special'},
      success
        ? {img: goalArt(s), title: 'GOOOAL!', text: legendMove ? `${ot.special} is unstoppable!\n${ot.name} turn legend into a goal!` : `${ot.special} breaks through!\n${ot.name} take the moment!`, sound:'goal'}
        : {img: missArt(s), title: 'Denied!', text: `${ot.special} looked dangerous...\nbut the keeper or defense survives it.`, sound:'miss'}
    ], ()=>{
      if(success){ goalResult(); resetAfterGoal(d); setAnim('kickoff', before, `${dt.name} restart`, ballPosFor(d,'player',2)); }
      else {
        const near = roll < goalChance + 18;
        if(near && chance(.55)){ cornerEvent(); return; }
        state.possession=d; state.zone=1; state.carrier='keeper'; setAnim('save', before, `${dt.name} survive special`, ballPosFor(d,'keeper',1));
      }
      render();
    });
    return;
  }

  if(roll < goalChance){
    goalResult();
    const next = () => { resetAfterGoal(d); setAnim('kickoff', before, `${dt.name} restart`, ballPosFor(d,'player',2)); speak(s, shooterRole, `${ot.name} celebrate as the crowd roars!`); render(); };
    showCinematic([{img: goalArt(s), title:'GOOOAL!', text:`${ot.name} find the net!\nThe finish beats the keeper.`, sound:'goal'}], next);
    return;
  }

  const near = roll < goalChance + 18;
  if(near && chance(.24)){ crossbarEvent(); return; }
  if(near && chance(.55)){ cornerEvent(); return; }
  if(near){ 
    recordEvent('save', d); 
    log(`<b>Big Save:</b> ${dt.name} keeper keeps it out.`); 
    addMeter(s,6); addMeter(d,12); adjustBrazilMood(s,-1); adjustBrazilMood(d,1); 
    showCinematic([{img:ASSETS.bigSave,title:'Big Save!',text:`${dt.name} keeper flies across and keeps it out.`,sound:'click',vertical:true}], ()=>{
      state.possession=d; state.zone=1; state.carrier='keeper'; 
      setAnim('save', before, `${dt.name} keeper save`, ballPosFor(d,'keeper',1)); 
      speak(d,'goalie','The keeper judges it well and makes the save.','Goalkeeper'); 
      render(); 
    });
    return; 
  }
  if(state.zone>=3 && chance(.25)){ cornerEvent(); return; }
  wideMissGoalKick();
}

function resetAfterGoal(newPoss){ state.possession=newPoss; state.zone=2; state.carrier=randomCarrier(false); state.phase='idle'; state.minute=clamp(state.minute+1,0,90); }

function startPenalties(){ state.phase='penShoot'; state.pen={round:1, shooting:'P', score:{P:0,A:0}, target:null, history:[]}; speak('P','captain','Penalty shootout. Five kicks each. If still tied, sudden death.'); render(); }
function lockShot(dir){ ensureAudio(); state.pen.target=dir; state.phase='penLocked'; speak(state.pen.shooting,'captain','Shot selected and locked in.'); render(); }
function keeperGuess(){ ensureAudio(); state.phase='penKeeper'; speak(other(state.pen.shooting),'goalie','Read the shooter and commit.','Goalkeeper'); render(); }
function penaltyTaken(side){ return state.pen.history.filter(h=>h.s===side).length; }
function shootoutOver(){
  const p=state.pen, takenP=penaltyTaken('P'), takenA=penaltyTaken('A');
  const remP=Math.max(0,5-takenP), remA=Math.max(0,5-takenA);
  if(takenP<=5 && takenA<=5){
    if(p.score.P > p.score.A + remA) return true;
    if(p.score.A > p.score.P + remP) return true;
    if(takenP===5 && takenA===5 && p.score.P!==p.score.A) return true;
    return false;
  }
  if(takenP===takenA && takenP>=5 && p.score.P!==p.score.A) return true;
  return false;
}
function resolvePenalty(guess){
  ensureAudio();
  const p=state.pen,s=p.shooting,target=p.target;

  // Penalty shootout tuning:
  // - Penalties should usually score.
  // - Correct keeper guesses reduce the chance, but do not make saves automatic.
  // - After 3 straight missed penalties, force the next kick to score so the shootout never reaches 4 misses in a row.
  const straightMisses = p.history.slice(-3).filter(h=>!h.goal).length;
  const forceGoal = straightMisses >= 3;
  const previousKick = p.history[p.history.length-1];
  const forceDecider = p.history.length >= 13 && p.history.length % 2 === 1 && previousKick;
  let scoreChance = target===guess ? 58 : (guess==='middle'||target==='middle' ? 88 : 96);
  scoreChance += s==='P'?3:5;
  scoreChance = clamp(scoreChance, 55, 97);
  let goal = forceGoal ? true : chance(scoreChance/100);
  if(forceDecider) goal = !previousKick.goal;

  const finish = ()=>{ p.history.push({s,target,guess,goal,scoreChance,forceGoal,forceDecider}); if(shootoutOver()){ state.phase='penDone'; const winner = p.score.P>p.score.A?'P':'A'; triggerVictoryCelebration(winner,true); } else { state.phase='penResult'; render(); } };
  const intro = {img:s==='P'?ASSETS.penPt:ASSETS.penAr,title:'Penalty Kick',text:`${sideName(s)} step up from the spot.
The keeper reads the body shape and commits.`,sound:'click',vertical:true};
  if(goal){
    p.score[s]++;
    showCinematic([intro,{img:goalArt(s),title:'Penalty Goal!',text:`${sideName(s)} score from the spot.`,sound:'goal'}], ()=>{ speak(s,'captain',`He shoots ${target.toUpperCase()}!
It is in.`); finish(); });
  } else {
    showCinematic([intro,{img:missArt(s),title:'Penalty Miss!',text:`No goal! The shootout pressure rises.`,sound:'miss'}], ()=>{ speak(other(s),'goalie',`He guessed ${guess.toUpperCase()} and the shot was ${target.toUpperCase()}.
Saved!`,'Goalkeeper'); finish(); });
  }
}
function nextPenaltyKick(){ const p=state.pen; p.shooting = p.history.length % 2 === 0 ? 'P' : 'A'; p.round = Math.floor(p.history.length/2)+1; p.target=null; state.phase='penShoot'; speak(p.shooting,'captain',`${sideName(p.shooting)} step up for penalty ${p.round}.`); render(); }

function restartCurrentMatch(){ if(state.playMode==='campaign' && state.campaign) startCampaignMatch(); else startFaceoff(); }
function render(){ const app=document.getElementById('app'); app.innerHTML = state.mode==='splash' ? splashScreen() : state.mode==='tutorialPrompt' ? tutorialPromptScreen() : state.mode==='tutorial' ? renderTutorial() : state.mode==='menu' ? menuScreen() : state.mode==='how' ? howScreen() : state.mode==='campaignTeams' ? renderCampaignTeams() : state.mode==='campaignDifficulty' ? renderCampaignDifficulty() : state.mode==='campaignRoute' ? renderCampaignRoute() : renderMatch(); }

initState(); render();
setTimeout(()=>{ if(state && state.mode==='splash'){ state.splashReady=true; render(); } }, 3000);
</script></body></html>
